<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>確認付款資訊</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/confirm-payment.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <img class="logo-TWM" src="/src/images/logo-TWM.svg" alt="">
        </div>
    </header>

    <div class="container">
        <div class="content-block confirm-payment-content-block">
            <img src="/src/images/home-phone.png" alt="" class="">
            <div class="content">
                <h3>付款摘要</h3>
                <p class="meta">訂單編號：#12345678</p>
                <p>費用合計：<strong>NT$ 1,200</strong></p>
                <p>付款方式：信用卡（末四碼 4242）</p>
                <div class="form-check">
                    <input id="chk-1" type="checkbox">
                    <label for="chk-1">本人已閱讀 隱私權政策 與 使用者條款 ，並確認訂購交易資料正確無誤</label>
                </div>

                <div class="margin-top-md">
                    <button id="open-popup" class="btn">查看付款明細 (開啟 Popup)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Popup (local to this page) -->
    <div class="popup-overlay" id="confirm-popup" aria-hidden="true">
        <div class="popup" role="dialog" aria-modal="true">
            <button class="popup-close" id="confirm-popup-close" aria-label="關閉">&times;</button>
            <div class="content-block">
                <h4>付款明細</h4>
                <p>此處顯示詳細費用分項、稅額與優惠資訊。</p>
                <div class="margin-top-md">
                    <button class="btn" id="confirm-popup-ok">關閉</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var open = document.getElementById('open-popup');
            var overlay = document.getElementById('confirm-popup');
            var close = document.getElementById('confirm-popup-close');
            var ok = document.getElementById('confirm-popup-ok');

            function openPopup() {
                overlay.classList.add('is-open');
                overlay.setAttribute('aria-hidden', 'false');
                close && close.focus();
            }

            function closePopup() {
                overlay.classList.remove('is-open');
                overlay.setAttribute('aria-hidden', 'true');
                open && open.focus();
            }
            open && open.addEventListener('click', openPopup);
            close && close.addEventListener('click', closePopup);
            ok && ok.addEventListener('click', closePopup);
            overlay && overlay.addEventListener('click', function(e) {
                if (e.target === overlay) closePopup();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && overlay.classList.contains('is-open')) closePopup();
            });
        })();
    </script>
</body>

</html>
