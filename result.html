<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>台灣大哥大 遊戲金流系統 交易結果</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/result.css" />
  </head>

  <body>
    <header class="header">
      <div class="container">
        <img class="logo-TWM" src="/src/images/logo-TWM.svg" alt="" />
      </div>
    </header>

    <main>
      <div class="container">
        <!-- 成功狀態卡片 -->
        <div class="card card--success">
          <img src="/src/images/icon-result-Success.png" alt="" />
          <h2>交易成功</h2>
          <p>一切就緒，準備開啟下一段挑戰！</p>
          <button class="btn btn--block-mobile">返回首頁</button>
        </div>

        <!-- 失敗狀態卡片 -->
        <div class="card card--danger">
          <img src="/src/images/icon-result-Error.png" alt="" />
          <h2>交易失敗</h2>
          <p>餘額不足，請改用其他方式</p>
          <button class="btn btn--block-mobile">返回首頁</button>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p>台灣大哥大版權所有 © 2025 TaiwanMobile All Rights Reserved.</p>
      </div>
    </footer>
  </body>
</html>
