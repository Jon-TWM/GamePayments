<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>設定發票資訊</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/invoice-setup.css">
    <style>
        .page-invoice-setup .content-block {
            max-width: 800px;
            margin: 0 auto
        }
        
        .invoice-note {
            font-size: 1.4rem;
            color: #515A68;
            margin-bottom: .8rem
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container">
            <img class="logo-TWM" src="/src/images/logo-TWM.svg" alt="">
        </div>
    </header>

    <main class="page-invoice-setup">
        <div class="container">
            <section class="section-gap">
                <h2 class="margin-bottom-lg">設定發票資訊</h2>
                <div class="content-block">
                    <form class="invoice-form" onsubmit="event.preventDefault();">
                        <p class="invoice-note">若需公司發票請填寫統一編號。<a href="#" id="open-note">注意事項</a></p>

                        <label for="name">收件人姓名</label>
                        <input id="name" class="form-input" type="text" placeholder="姓名">

                        <label for="invoice-type" class="margin-top-md">發票類型</label>
                        <select id="invoice-type" class="form-input">
              <option value="personal">個人</option>
              <option value="company">公司</option>
            </select>

                        <div id="company-info" style="display:none;" class="margin-top-md">
                            <label for="company-id">公司統一編號</label>
                            <input id="company-id" class="form-input" type="text" placeholder="統一編號">
                        </div>

                        <div class="margin-top-md">
                            <button class="btn" type="submit">儲存</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <!-- 注意事項 Popup -->
    <div class="popup-overlay" id="note-popup" aria-hidden="true">
        <div class="popup" role="dialog" aria-modal="true">
            <button class="popup-close" id="note-popup-close" aria-label="關閉">&times;</button>
            <div class="content-block">
                <h4>注意事項</h4>
                <p>開立發票會依平台政策進行驗證，請確保資料正確無誤。</p>
                <div class="margin-top-md">
                    <button class="btn" id="note-popup-ok">我知道了</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var openNote = document.getElementById('open-note');
            var overlay = document.getElementById('note-popup');
            var close = document.getElementById('note-popup-close');
            var ok = document.getElementById('note-popup-ok');

            function openPopup() {
                overlay.classList.add('is-open');
                overlay.setAttribute('aria-hidden', 'false');
                close && close.focus();
            }

            function closePopup() {
                overlay.classList.remove('is-open');
                overlay.setAttribute('aria-hidden', 'true');
                openNote && openNote.focus();
            }
            openNote && openNote.addEventListener('click', function(e) {
                e.preventDefault();
                openPopup();
            });
            close && close.addEventListener('click', closePopup);
            ok && ok.addEventListener('click', closePopup);
            overlay && overlay.addEventListener('click', function(e) {
                if (e.target === overlay) closePopup();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && overlay.classList.contains('is-open')) closePopup();
            });

            var invoiceType = document.getElementById('invoice-type');
            var companyInfo = document.getElementById('company-info');
            invoiceType && invoiceType.addEventListener('change', function() {
                companyInfo.style.display = this.value === 'company' ? 'block' : 'none';
            });
        })();
    </script>
</body>

</html>
